spring.application.name=AirplanePjt

server.port=8085

# 데이터베이스 URL 및 사용자 정보
spring.datasource.url=jdbc:mysql://localhost:3306/airplane_db?serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=1234

# JPA 관련 설정 (옵션)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
